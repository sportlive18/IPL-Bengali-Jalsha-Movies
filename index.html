<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hotstar</title>
<meta name="referrer" content="no-referrer">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4.16.2/dist/controls.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif}

.shaka-video-container{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

video{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#000;
}

.custom-watermark{
  position:absolute;
  z-index:40;
  pointer-events:none;
  top:65%;
  left:6%;
  transform:translateY(-50%);
  font-size:11px;
  font-weight:600;
  color:rgba(255,255,255,0.12);
}

.block-overlay{
  position:fixed;
  inset:0;
  z-index:99999;
  display:flex;
  align-items:center;
  justify-content:center;
  background:radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
  text-align:center;
}

.block-box{
  padding:40px;
  max-width:500px;
  width:90%;
  background:rgba(20,20,20,0.95);
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:translateY(0); }
}

.block-title{
  font-size:42px;
  font-weight:800;
  color:#ffffff;
  text-transform:uppercase;
  letter-spacing:2px;
  margin-bottom:20px;
  text-shadow:0 0 10px rgba(255,0,0,0.3);
}

.block-sub{
  font-size:14px;
  font-weight:500;
  color:rgba(255,255,255,0.6);
  line-height:1.6;
}

.block-icon{ display:none; }
.block-note{ display:none; }

@media(max-width:700px){
  .custom-watermark{font-size:9px;top:60%;left:16%}
  .block-title{font-size:28px}
  .block-box{padding:25px}
  .block-sub{font-size:12px}
}
</style>
</head>

<body>

<div class="shaka-video-container" id="player-container">
  <video id="video" autoplay muted playsinline preload="metadata"></video>
  <div class="custom-watermark"> </div>
</div>

<script>
(function(){

  /* ── Sandbox detection ── */
  function isSandboxedEnv(){
    try {
      if(window.self===window.top) return false;
      if(window.frameElement&&window.frameElement.hasAttribute("sandbox")) return true;
      try {
        document.domain=document.domain;
        if(window.frameElement&&!window.frameElement.getAttribute("sandbox")) return false;
      } catch(e){ return true; }
      return false;
    } catch(e){ return true; }
  }

  function triggerBlockScreen(title,message){
    const container=document.getElementById("player-container");
    const video=document.getElementById("video");
    try{ video.pause(); video.removeAttribute('src'); video.load(); }catch(e){}
    const overlay=document.createElement("div");
    overlay.className="block-overlay";
    overlay.id="sandbox-block-display";
    overlay.innerHTML=`
      <div class="block-box">
        <div class="block-title">${title}</div>
        <div class="block-sub">${message}</div>
      </div>`;
    document.body.appendChild(overlay);
    container.style.display='none';
  }

  if(isSandboxedEnv()){
    triggerBlockScreen('Disable Sandbox','Opening Chrome Browser Only & Disable Ad blocker');
    return;
  }

  /* ── CONFIG ── */
  const CONFIG = {
    // MPD stream
    streamUrl: "https://livetv.hotstar.com/mp1/gec-india-1540065788/fa6a4f0005ef4f90ab24484d165b0aaf/index.mpd",

    // Hotstar cookie (directly embedded)
    cookie: "hdntl=exp=1776675371~acl=%2f*~id=827ee1057d2da0d5a5dd45c84517057f~data=hdntl~hmac=92c835cb5ea2581756c5401dea24c006996270fdc17e9c6360297a4633e46792",

    // ClearKey DRM  →  keyId : key  (both hex)
    clearKeys: {
      "81872faa1d6b45fa9045cdeb2e310000": "9b88168e61274587a471962c46b94675"
    }
  };

  document.addEventListener("DOMContentLoaded", async () => {

    shaka.polyfill.installAll();
    if(!shaka.Player.isBrowserSupported()) return;

    const video     = document.getElementById("video");
    const container = document.getElementById("player-container");

    video.muted = true;

    const player = new shaka.Player();
    await player.attach(video);

    const ui = new shaka.ui.Overlay(player, container, video);
    ui.configure({
      addBigPlayButton: true,
      controlPanelElements: [
        "mute",
        "play_pause",
        "time_and_duration",
        "spacer",
        "quality",
        "picture_in_picture",
        "fullscreen"
      ],
      seekBarColors: {
        base:     "white",
        buffered: "red",
        played:   "green"
      }
    });

    /* ── Player config: streaming + ClearKey DRM ── */
    player.configure({
      drm: {
        clearKeys: CONFIG.clearKeys   // hex keyId → hex key
      },
      manifest: {
        defaultPresentationDelay: 5
      },
      streaming: {
        lowLatencyMode:  true,
        bufferingGoal:   10,
        rebufferingGoal: 2,
        safeSeekOffset:  5
      }
    });

    /* ── Request filter: inject Hotstar headers + cookie ── */
    player.getNetworkingEngine().registerRequestFilter((type, request) => {
      request.headers["Cookie"]      = CONFIG.cookie;
      request.headers["Referer"]     = "https://www.hotstar.com/";
      request.headers["Origin"]      = "https://www.hotstar.com";
      request.headers["User-Agent"]  = "Hotstar;in.startv.hotstar/25.02.24.8.11169 (Android/15)";
    });

    /* ── Load & play ── */
    try {
      await player.load(CONFIG.streamUrl);
      video.play().catch(() => {});
    } catch(e) {
      console.error("Shaka load error:", e);
    }

    video.addEventListener("play", () => { video.muted = false; });
  });

})();
</script>

<script>(function(s){s.dataset.zone='10603308',s.src='https://bvtpk.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>

</body>
</html>
