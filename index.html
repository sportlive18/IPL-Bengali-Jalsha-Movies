<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hotstar</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "https://jcevents.hotstar.com/bpk-tv/e03bbf7688f4b14faa3782e78851c3d9_CTV/Fallback/e03bbf7688f4b14faa3782e78851c3d9.m3u8?|cookie=hdntl=exp=1776588431~acl=%2f*~id=09c42fbd308f9d619e1f17e3e95a09d4~data=hdntl~hmac=3fa166ef73a70c998f63844c90390df3daf7d4aa81e171aaf7ae075a7210ba23&User-agent=Hotstar;in.startv.hotstar/25.02.24.8.11169%20(Android/15)&origin=https://www.hotstar.com&Referer=https://www.hotstar.com";

      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;

      function setupPlayer(hls, qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) {
                  hls.currentLevel = index;
                }
              });
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(()=>{});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          autoStartLoad: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          video.play().catch(()=>{});
          setupPlayer(hls, availableQualities);
        });

        // 🔥 AUTO RECOVER ON ERROR
        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            hls.startLoad();
          }
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(()=>{});
          setupPlayer(null);
        });
      }
    });
  </script>
</body>
</html>
