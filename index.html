<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hotstar</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>
  
  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    html, body {
      height: 100%;
      width: 100%;
    }
    .video-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video autoplay playsinline muted id="player" controls preload="metadata"></video>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const video = document.getElementById("player");
      const source = "https://eus23.playlist.live-video.net/v1/playlist/CrgF_LDZ6RWJygiJSglt2E4a7vOGGkv1rvEeV58a_b9OIruWMtaUkPbrpdg74yRZvE_fDfo4_GyZcgb-11nsz8yrJa8oSwxgwFpq_WfFH3dYGUSKmTMrVeXX-YDbb_bfZy21IBv1d9_w7qF-H3ish9UNxTezGcBFYQUEJXWFI5Hjm8hk2QNFHaF7Geuv03PflfBpa8OjVzw0-B3dF3Lgz5o6UlYZcUYUOZLeC1JAy5MfwHunpU9pnlkkJmp-Fj4TPOI9OgAmeWfh_-bqHbN5ENOoYumaQM5hkEdPGSbRRdeSJdj2rMwP7oMAcY3FpDVDhhti1ZZciYwV0EEq920uAl6jah--B1HRsp8pWkmWWB4wMKokFaDHPpLKiLD4jQFoukoSjGGrU_qMkNjAtcw1pldXEykj5djGWhsy6Gz8QFZNvOyJFDM3JxUBJ_YMkZzFRHWG-D7jzUxQ2AUxAgIafRrnpe-mjBkHCVBTgz7r6vJJgTbxVk6Jyvt0OOYURjbqpgGwDhU8FPOsAgvsoeLWNq9g5i_ergfiLD92-QOVQE9fFZTA4rIZQcWtcfc6x_aDGT4lKYVo--UTVJ72z3QRiWzNsFDnnFX8a60BFNAbuawvV6yfUNISPE04xs4w4EezKy2CfNk7fIuFStvs5QZDuyMcT8wCafzg0yqzktz1iZu1FHt_Cn84OkUDKacsD49SZqPqpqmGn_jjs-MhrUO5kC3wNNpDINDAMMI-p227FQZRE4mKiFaSI8kOSuu0_eoXvm88arC5fBxEe7PWFhWftG7Ede8r4ucHmWIjUrXwrA5BEgk4u2B2D2rpYFBj-oENmrhCJGFhULVJoq3EFstWOOVuLOTP1ZgZbZUrSSq6WtllgPcn0ux4PsinasC97pZweK5_sRjBCaEjyR8w41DOjg31QHmrvaK9NQEWGgwt2wdiPJPUQXi1XBsgASoJZXUtd2VzdC0yMPYO.m3u8";

      const defaultOptions = {
        autoplay: true,
        controls: [
          'play', 'rewind', 'fast-forward', 'progress', 'current-time',
          'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['quality']
      };

      let player;

      function setupPlayer(hls, qualities = []) {
        player = new Plyr(video, {
          ...defaultOptions,
          quality: qualities.length ? {
            default: qualities[0],
            options: qualities,
            forced: true,
            onChange: q => {
              hls.levels.forEach((level, index) => {
                if (level.height === q) {
                  hls.currentLevel = index;
                }
              });
            }
          } : {}
        });

        // 🔁 AUTO RESUME
        setInterval(() => {
          if (video.paused && video.readyState > 2) {
            video.play().catch(()=>{});
          }
        }, 3000);

        // 🔊 AUTO UNMUTE (on first interaction)
        const unmute = () => {
          video.muted = false;
          video.volume = 1;
          document.removeEventListener("click", unmute);
          document.removeEventListener("touchstart", unmute);
        };

        document.addEventListener("click", unmute);
        document.addEventListener("touchstart", unmute);
      }

      if (Hls.isSupported()) {
        const hls = new Hls({
          autoStartLoad: true
        });

        hls.loadSource(source);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
          const availableQualities = data.levels.map(l => l.height).sort((a,b) => b - a);
          video.play().catch(()=>{});
          setupPlayer(hls, availableQualities);
        });

        // 🔥 AUTO RECOVER ON ERROR
        hls.on(Hls.Events.ERROR, function (_, data) {
          if (data.fatal) {
            hls.startLoad();
          }
        });

      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = source;
        video.addEventListener("loadedmetadata", () => {
          video.play().catch(()=>{});
          setupPlayer(null);
        });
      }
    });
  </script>
</body>
</html>
